<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">我的摄影作品</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: visible;
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", Tahoma, Arial, sans-serif;
      color: #fff;
      background: #000;
    }
    a { color: #fff; text-decoration: none; outline: 0; }

    /* Cover Intro */
    #cover {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      transition: opacity 0.7s cubic-bezier(0.76, 0, 0.24, 1),
                  top 0.8s cubic-bezier(0.76, 0, 0.24, 1) 0.05s;
    }
    #cover.hidden { opacity: 0; top: -100%; pointer-events: none; }

    .camera-group { transform-origin: 60px 60px; animation: camera-in 0.4s ease-out forwards; }
    @keyframes camera-in { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .camera-group.pulse { animation: gentle-breathe 2.5s ease-in-out 0.3s infinite; }
    @keyframes gentle-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

    /* Slider */
    #slider { position: fixed; inset: 0; width: 100%; height: 100%; }
    .slide { position: absolute; inset: 0; transition: opacity 1.5s ease; }
    .slide-backdrop { position: absolute; inset: -10%; background-size: cover; background-position: center; filter: blur(60px); }
    .slide-img { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; }
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }

    /* Site Header */
    .site-header {
      position: fixed; top: 40px; left: 50px; z-index: 50;
      width: 44px; height: 44px; cursor: pointer;
    }
    .site-header svg { width: 44px; height: 44px; overflow: visible; }
    .site-header:hover svg { opacity: 0.7; }

    /* Hamburger Menu */
    .hamburger-menu { position: fixed; top: 40px; right: 50px; z-index: 50; }
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 5px; padding: 8px 4px;
    }
    .hamburger-btn:hover span { background: #fff; }
    .hamburger-btn span {
      display: block; height: 2px; border-radius: 1px;
      background: rgba(255,255,255,0.85);
      transition: all 0.3s ease;
    }
    .hamburger-btn span:nth-child(1) { width: 22px; }
    .hamburger-btn span:nth-child(2) { width: 16px; }
    .hamburger-btn span:nth-child(3) { width: 10px; }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); width: 22px; }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); width: 22px; }

    .menu-dropdown {
      position: absolute; top: 36px; right: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px; padding: 8px 0;
      min-width: 110px;
      opacity: 0; transform: translateY(-8px);
      pointer-events: none; transition: all 0.25s ease;
    }
    .menu-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .menu-dropdown a {
      display: block; padding: 8px 20px;
      font-size: 13px; letter-spacing: 2px;
      color: rgba(255,255,255,0.8); transition: all 0.2s ease;
    }
    .menu-dropdown a:hover,
    .menu-dropdown a.active { color: #fff; background: rgba(255,255,255,0.08); }
    .menu-dropdown a.active { border-right: 2px solid #fff; }

    /* Tagline */
    .tagline {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      z-index: 40; font-size: 12px; font-weight: 500;
      letter-spacing: 4px; text-align: center;
      color: rgba(255,255,255,0.7); white-space: nowrap;
    }

    /* Footer */
    .footer {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 50; font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }

    /* ===== Speed Control ===== */
    .speed-toggle {
      position: fixed; bottom: 30px; right: 50px; z-index: 50;
      width: 28px; height: 28px; cursor: pointer;
      opacity: 0.5; transition: opacity 0.2s;
    }
    .speed-toggle:hover { opacity: 0.9; }
    .speed-toggle svg { width: 28px; height: 28px; overflow: visible; }

    .speed-panel {
      position: fixed; bottom: 66px; right: 50px; z-index: 45;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px; padding: 10px 14px;
      display: none; align-items: center; gap: 8px;
      opacity: 0; transform: translateY(-8px);
      transition: all 0.25s ease;
    }
    .speed-panel.open { display: flex; opacity: 1; transform: translateY(0); }
    .speed-panel .icon { font-size: 15px; line-height: 1; }
    .speed-panel input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px; outline: none;
      cursor: pointer;
    }
    .speed-panel input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .speed-panel input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .speed-panel input[type="range"]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer; border: none;
    }
    .speed-label {
      font-size: 11px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px; min-width: 28px; text-align: center;
    }

    /* ===== Settings Modal ===== */
    .settings-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 40px;
    }
    .settings-overlay.open { display: flex; }

    .settings-panel {
      background: #1a1a1a;
      border-radius: 12px;
      width: 100%; max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 32px 24px;
    }
    .settings-panel::-webkit-scrollbar { width: 4px; }
    .settings-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .settings-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .settings-header h2 {
      font-size: 16px; font-weight: 400;
      letter-spacing: 3px; color: #ccc;
    }
    .settings-close {
      background: none; border: none; color: #666;
      font-size: 20px; cursor: pointer; padding: 4px 8px;
      transition: color 0.2s;
    }
    .settings-close:hover { color: #fff; }

    /* Tabs */
    .settings-tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .settings-tab {
      padding: 6px 16px; border-radius: 4px;
      font-size: 13px; letter-spacing: 1px;
      color: #888; cursor: pointer; border: none; background: none;
      transition: all 0.2s;
    }
    .settings-tab:hover { color: #ddd; background: rgba(255,255,255,0.05); }
    .settings-tab.active { color: #fff; background: rgba(255,255,255,0.1); }

    /* Image grid */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
      content-visibility: auto;
      contain-intrinsic-size: 1px 800px;
    }
    .settings-img {
      position: relative; cursor: pointer;
      border-radius: 6px; overflow: hidden;
      aspect-ratio: 3 / 2;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      content-visibility: auto;
      contain-intrinsic-size: 100px 67px;
    }
    .settings-img.checked { border-color: #fff; }
    .settings-img:hover { border-color: rgba(255,255,255,0.4); }
    .settings-img.checked:hover { border-color: #fff; }
    .settings-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .settings-img .check {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent;
      transition: all 0.2s;
    }
    .settings-img.checked .check {
      background: #fff;
      color: #000;
    }
    .settings-grid.batch .settings-img,
    .settings-grid.batch .settings-img .check {
      transition: none !important;
    }

    .settings-actions {
      display: flex; justify-content: space-between; gap: 10px;
      padding-top: 16px; border-top: 1px solid #2a2a2a;
    }
    .settings-actions-left,
    .settings-actions-right {
      display: flex; gap: 10px;
    }
    .settings-btn {
      padding: 8px 20px; border-radius: 6px;
      font-size: 13px; letter-spacing: 1px;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .settings-btn-reset {
      background: none; color: #666;
    }
    .settings-btn-reset:hover { color: #fff; }
    .settings-btn-save {
      background: #fff; color: #000;
    }
    .settings-btn-save:hover { background: #ddd; }

    /* ===== Login Modal ===== */
    .login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-overlay.open { display: flex; }

    .login-panel {
      background: #1a1a1a;
      border-radius: 12px;
      width: 100%; max-width: 360px;
      padding: 32px 28px 24px;
    }
    .login-panel h2 {
      font-size: 16px; font-weight: 400;
      letter-spacing: 3px; color: #ccc;
      text-align: center; margin-bottom: 24px;
    }
    .login-field {
      margin-bottom: 16px;
    }
    .login-field label {
      display: block; font-size: 12px;
      letter-spacing: 1px; color: #888;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%; padding: 10px 14px;
      background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 6px; color: #fff;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: #666; }
    .login-field input::placeholder { color: #555; }

    .login-error {
      color: #e74c3c; font-size: 12px;
      text-align: center; margin-bottom: 12px;
      min-height: 18px;
    }
    .login-btn {
      width: 100%; padding: 10px;
      background: #fff; color: #000;
      border: none; border-radius: 6px;
      font-size: 14px; letter-spacing: 2px;
      cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: #ddd; }
  </style>
</head>
<body>

  <!-- Cover Intro -->
  <div id="cover">
    <svg viewBox="0 0 120 120" width="160" height="160">
      <g class="camera-group">
        <polygon points="34,18 86,18 90,32 30,32"
                 stroke="#000" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
        <circle cx="24" cy="26" r="5" stroke="#000" stroke-width="1.8" fill="none"/>
        <circle cx="24" cy="26" r="2" fill="#000"/>
        <circle cx="92" cy="28" r="4.5" stroke="#000" stroke-width="1.2" fill="none" opacity="0.3"/>
        <circle cx="92" cy="28" r="2" fill="#000" opacity="0.3"/>
        <rect x="10" y="32" width="100" height="72" rx="8"
              stroke="#000" stroke-width="2.5" fill="none"/>
        <circle cx="60" cy="70" r="33" stroke="#000" stroke-width="2.5" fill="none"/>
        <circle cx="60" cy="70" r="28" stroke="#000" stroke-width="2" fill="none" opacity="0.3"/>
        <circle cx="60" cy="70" r="23" stroke="#000" stroke-width="1" fill="none" opacity="0.2"/>
        <circle cx="60" cy="70" r="18" stroke="#000" stroke-width="2" fill="none"/>
        <circle cx="60" cy="70" r="14" stroke="#000" stroke-width="1" fill="none" opacity="0.25"/>
        <circle cx="60" cy="70" r="10" stroke="#000" stroke-width="0.8" fill="none" opacity="0.15"/>
        <circle cx="60" cy="70" r="3" fill="#000" opacity="0.5"/>
        <ellipse cx="52" cy="63" rx="8" ry="3.5" fill="#000" opacity="0.08"
                 transform="rotate(-25 52 63)"/>
        <ellipse cx="70" cy="78" rx="5" ry="2" fill="#000" opacity="0.05"
                 transform="rotate(-25 70 78)"/>
      </g>
    </svg>
  </div>

  <!-- Background Slider -->
  <div id="slider"></div>

  <!-- Site Header -->
  <div class="site-header" id="siteHeader">
    <svg viewBox="0 0 44 44">
      <polygon points="14,5 30,5 32,11 12,11"
               stroke="#fff" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
      <circle cx="11" cy="11" r="2" stroke="#fff" stroke-width="1" fill="none" opacity="0.6"/>
      <circle cx="11" cy="11" r="0.8" fill="#fff" opacity="0.4"/>
      <rect x="2" y="11" width="40" height="27" rx="5"
            stroke="#fff" stroke-width="1.5" fill="none"/>
      <circle cx="22" cy="25" r="13" stroke="#fff" stroke-width="1.5" fill="none"/>
      <circle cx="22" cy="25" r="10" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
      <circle cx="22" cy="25" r="7" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.2"/>
      <circle cx="22" cy="25" r="4" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.35"/>
      <circle cx="22" cy="25" r="1.5" fill="#fff" opacity="0.4"/>
    </svg>
  </div>

  <!-- Speed Toggle -->
  <div class="speed-toggle" id="speedToggle" title="轮播速度">
    <svg viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="14" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" fill="none"/>
      <circle cx="18" cy="18" r="2" fill="rgba(255,255,255,0.85)"/>
      <line x1="18" y1="18" x2="18" y2="8" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="25" y2="21" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Hamburger Menu -->
  <div class="hamburger-menu">
    <button class="hamburger-btn" id="menuToggle">
      <span></span><span></span><span></span>
    </button>
    <div class="menu-dropdown" id="menuDropdown">
      <div id="menuList"></div>
    </div>
  </div>

  <!-- Tagline -->
  <div class="tagline" id="tagline"></div>

  <!-- Speed Panel -->
  <div class="speed-panel" id="speedPanel">
    <span class="icon">🐢</span>
    <input type="range" id="speedRange" min="1500" max="8000" value="4000" step="500">
    <span class="speed-label" id="speedLabel">4s</span>
    <span class="icon">🐇</span>
  </div>

  <!-- Footer -->
  <div class="footer">Designed by xiaowei</div>

  <!-- Login Modal -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-panel">
      <h2>管 理 员 登 录</h2>
      <div class="login-field">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="请输入用户名">
      </div>
      <div class="login-field">
        <label>密码</label>
        <input type="password" id="loginPass" placeholder="请输入密码">
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="login-btn" id="loginBtn">登 录</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>配 置 中 心</h2>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-tabs" id="settingsTabs"></div>
      <div class="settings-grid" id="settingsGrid"></div>
      <div class="settings-actions">
        <div class="settings-actions-left">
          <button class="settings-btn settings-btn-reset" id="settingsSelectAll">全选</button>
          <button class="settings-btn settings-btn-reset" id="settingsDeselectAll">全不选</button>
        </div>
        <div class="settings-actions-right">
          <button class="settings-btn settings-btn-reset" id="settingsReset">重置为默认</button>
          <button class="settings-btn settings-btn-save" id="settingsSave">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Config =====
    var defaultConfig = null;
    var currentConfig = null;
    var currentKey = 'home';
    var slideTimer = null;
    var slideCurrent = 0;
    var slidePhotos = [];

    // ===== Load Config =====
    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

    function loadConfig(callback) {
      fetch('config.json').then(function(r) { return r.json(); }).then(function(data) {
        defaultConfig = data;
        currentConfig = deepClone(data);
        fetch('/api/config').then(function(r) { return r.json(); }).then(function(remote) {
          if (remote && remote.photos) {
            currentConfig.photos = deepClone(remote.photos);
            if (remote.tagline) currentConfig.tagline = remote.tagline;
            if (remote.nav) currentConfig.nav = remote.nav;
          }
          callback();
        }).catch(function() {
          callback();
        });
      });
    }

    function saveConfigToRemote() {
      fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          photos: currentConfig.photos,
          tagline: currentConfig.tagline,
          nav: currentConfig.nav,
        }),
      });
    }

    function resetConfig() {
      currentConfig = deepClone(defaultConfig);
      fetch('/api/config', { method: 'DELETE' });
    }

    // ===== Cover Intro =====
    var cover = document.getElementById('cover');
    var cameraGroup = cover.querySelector('.camera-group');
    setTimeout(function() { cameraGroup.classList.add('pulse'); }, 300);
    setTimeout(function() { cover.classList.add('hidden'); }, 1200);

    // ===== Slider =====
    var slider = document.getElementById('slider');

    function goToSlide(index) {
      var slides = slider.querySelectorAll('.slide');
      if (slides.length === 0) return;
      slides[slideCurrent].style.opacity = '0';
      slideCurrent = (index + slides.length) % slides.length;
      slides[slideCurrent].style.opacity = '1';
    }

    function restartTimer() {
      if (slideTimer) clearInterval(slideTimer);
      slideTimer = setInterval(function() { goToSlide(slideCurrent + 1); }, currentConfig.slideInterval);
    }

    function imgUrl(filename) {
      return (currentConfig.baseUrl || '') + 'images/' + filename;
    }

    function initSlider(photos) {
      slider.querySelectorAll('.slide').forEach(function(el) { el.remove(); });
      slider.querySelectorAll('.overlay').forEach(function(el) { el.remove(); });
      if (slideTimer) clearInterval(slideTimer);
      slidePhotos = photos;
      slideCurrent = 0;
      if (!photos || photos.length === 0) return;
      photos.forEach(function(src, i) {
        var wrapper = document.createElement('div');
        wrapper.className = 'slide';
        wrapper.style.opacity = i === 0 ? '1' : '0';
        var backdrop = document.createElement('div');
        backdrop.className = 'slide-backdrop';
        backdrop.style.backgroundImage = 'url(' + imgUrl(src) + ')';
        wrapper.appendChild(backdrop);
        var img = document.createElement('div');
        img.className = 'slide-img';
        img.style.backgroundImage = 'url(' + imgUrl(src) + ')';
        wrapper.appendChild(img);
        slider.appendChild(wrapper);
      });
      var overlay = document.createElement('div');
      overlay.className = 'overlay';
      slider.appendChild(overlay);
      restartTimer();
    }

    // ===== Speed Control =====
    var speedToggle = document.getElementById('speedToggle');
    var speedPanel = document.getElementById('speedPanel');
    var speedRange = document.getElementById('speedRange');
    var speedLabel = document.getElementById('speedLabel');

    speedToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      speedPanel.classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.speed-panel') && !e.target.closest('.speed-toggle')) {
        speedPanel.classList.remove('open');
      }
    });

    speedRange.addEventListener('input', function() {
      var ms = parseInt(this.value);
      currentConfig.slideInterval = ms;
      speedLabel.textContent = (ms / 1000).toFixed(1) + 's';
      restartTimer();
    });

    // ===== Category Switching =====
    function switchCategory(key) {
      currentKey = key;
      document.getElementById('tagline').textContent = currentConfig.tagline[key] || '';
      var label = '';
      currentConfig.nav.forEach(function(item) {
        if (item.key === key) label = item.label;
      });
      document.getElementById('pageTitle').textContent = label + ' - ' + currentConfig.siteTitle;
      document.querySelectorAll('#menuList a').forEach(function(a) {
        a.classList.toggle('active', a.dataset.key === key);
      });
      initSlider(currentConfig.photos[key] || []);
    }

    // ===== Build Menu =====
    function buildMenu() {
      var menuList = document.getElementById('menuList');
      menuList.innerHTML = '';
      currentConfig.nav.forEach(function(item, i) {
        var a = document.createElement('a');
        a.href = '#';
        a.textContent = item.label;
        a.dataset.key = item.key;
        if (i === 0 || item.key === currentKey) a.classList.add('active');
        a.addEventListener('click', function(e) {
          e.preventDefault();
          switchCategory(this.dataset.key);
          document.getElementById('menuToggle').classList.remove('open');
          document.getElementById('menuDropdown').classList.remove('open');
        });
        menuList.appendChild(a);
      });
    }

    // ===== Hamburger Menu =====
    var toggle = document.getElementById('menuToggle');
    var dropdown = document.getElementById('menuDropdown');
    toggle.addEventListener('click', function() {
      this.classList.toggle('open');
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.hamburger-menu')) {
        toggle.classList.remove('open');
        dropdown.classList.remove('open');
      }
    });

    // ===== Keyboard Navigation =====
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') { e.preventDefault(); goToSlide(slideCurrent - 1); restartTimer(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); goToSlide(slideCurrent + 1); restartTimer(); }
    });

    // ===== Settings Panel =====
    var overlay = document.getElementById('settingsOverlay');
    var tabsEl = document.getElementById('settingsTabs');
    var gridEl = document.getElementById('settingsGrid');
    var editingCategory = null;
    var selectionState = {};

    function openSettings() {
      editingCategory = currentConfig.nav[0].key;
      selectionState = {};
      currentConfig.nav.forEach(function(item) {
        selectionState[item.key] = new Set(currentConfig.photos[item.key] || []);
      });
      overlay.classList.add('open');
      renderSettingsTabs();
      renderSettingsGrid(editingCategory);
    }

    function closeSettings() {
      overlay.classList.remove('open');
    }

    function renderSettingsTabs() {
      tabsEl.innerHTML = '';
      currentConfig.nav.forEach(function(item) {
        var btn = document.createElement('button');
        btn.className = 'settings-tab' + (item.key === editingCategory ? ' active' : '');
        btn.textContent = item.label;
        btn.addEventListener('click', function() {
          editingCategory = item.key;
          renderSettingsTabs();
          renderSettingsGrid(editingCategory);
        });
        tabsEl.appendChild(btn);
      });
    }

    function renderSettingsGrid(category) {
      gridEl.innerHTML = '';
      var allPhotos = currentConfig.photos.all || [];
      var selected = selectionState[category] || new Set();

      allPhotos.forEach(function(photo) {
        var div = document.createElement('div');
        div.className = 'settings-img' + (selected.has(photo) ? ' checked' : '');
        div.dataset.photo = photo;
        div.innerHTML = '<img src="' + imgUrl(photo) + '" alt="" loading="lazy">' +
          '<div class="check">&#10003;</div>';
        gridEl.appendChild(div);
      });
    }

    gridEl.addEventListener('click', function(e) {
      var target = e.target.closest('.settings-img');
      if (target) {
        target.classList.toggle('checked');
        var photo = target.dataset.photo;
        var set = selectionState[editingCategory];
        if (target.classList.contains('checked')) set.add(photo);
        else set.delete(photo);
      }
    });

    function selectAll() {
      var allPhotos = currentConfig.photos.all || [];
      var set = selectionState[editingCategory];
      allPhotos.forEach(function(p) { set.add(p); });
      requestAnimationFrame(function() {
        gridEl.classList.add('batch');
        var items = gridEl.getElementsByClassName('settings-img');
        for (var i = 0; i < items.length; i++) items[i].classList.add('checked');
        gridEl.offsetHeight;
        gridEl.classList.remove('batch');
      });
    }

    function deselectAll() {
      selectionState[editingCategory].clear();
      requestAnimationFrame(function() {
        gridEl.classList.add('batch');
        var items = gridEl.getElementsByClassName('settings-img');
        for (var i = 0; i < items.length; i++) items[i].classList.remove('checked');
        gridEl.offsetHeight;
        gridEl.classList.remove('batch');
      });
    }

    function saveSettings() {
      var arr = [];
      selectionState[editingCategory].forEach(function(p) { arr.push(p); });
      currentConfig.photos[editingCategory] = arr;
      saveConfigToRemote();
      if (currentKey === editingCategory) {
        initSlider(currentConfig.photos[editingCategory]);
      }
      closeSettings();
    }

    // ===== Login =====
    var loginOverlay = document.getElementById('loginOverlay');
    var loginUser = document.getElementById('loginUser');
    var loginPass = document.getElementById('loginPass');
    var loginError = document.getElementById('loginError');
    var loginBtn = document.getElementById('loginBtn');
    var loginAttempts = 0;

    var ADMIN_USER = 'xiaowei';
    var ADMIN_PASS = 'xiaowei666';

    function checkLogin() {
      return sessionStorage.getItem('adminLoggedIn') === 'true';
    }

    function showLogin() {
      loginUser.value = '';
      loginPass.value = '';
      loginError.textContent = '';
      loginOverlay.classList.add('open');
      loginUser.focus();
    }

    function doLogin() {
      var user = loginUser.value.trim();
      var pass = loginPass.value;
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        loginOverlay.classList.remove('open');
        openSettings();
      } else {
        loginAttempts++;
        loginError.textContent = '用户名或密码错误';
        loginPass.value = '';
        loginPass.focus();
      }
    }

    loginBtn.addEventListener('click', doLogin);
    loginPass.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // Ctrl+click on camera icon
    document.getElementById('siteHeader').addEventListener('click', function(e) {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        if (checkLogin()) {
          openSettings();
        } else {
          showLogin();
        }
      }
    });

    // Settings close/save/reset
    document.getElementById('settingsClose').addEventListener('click', closeSettings);
    document.getElementById('settingsSave').addEventListener('click', saveSettings);
    document.getElementById('settingsSelectAll').addEventListener('click', selectAll);
    document.getElementById('settingsDeselectAll').addEventListener('click', deselectAll);
    document.getElementById('settingsReset').addEventListener('click', function() {
      resetConfig();
      closeSettings();
      buildMenu();
      switchCategory(currentKey);
    });

    // Close overlay on background click
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeSettings();
    });

    // ===== Init =====
    loadConfig(function() {
      speedRange.value = currentConfig.slideInterval;
      speedLabel.textContent = (currentConfig.slideInterval / 1000).toFixed(1) + 's';
      buildMenu();
      switchCategory('home');
    });
  </script>
</body>
</html>
